<svg width="538" height="538" viewBox="0 0 538 538" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sheen" x1="269" y1="-40" x2="269" y2="538" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="face" cx="0.42" cy="0.34" r="0.78">
      <stop stop-color="#F1F7F8"/>
      <stop offset="1" stop-color="#DCEAED"/>
    </radialGradient>
  </defs>
  <!-- case rim + face -->
  <circle cx="269" cy="269" r="266" fill="#C4DAE0"/>
  <circle cx="269" cy="269" r="248" fill="url(#face)"/>
  <circle cx="269" cy="269" r="248" fill="none" stroke="#B4D0D8" stroke-width="2" opacity="0.7"/>
  <circle cx="269" cy="269" r="208" fill="none" stroke="#B4D0D8" stroke-width="2" opacity="0.45"/>
  <!-- cardinal ticks -->
  <g fill="#9BBFC8">
    <rect x="263" y="20" width="12" height="30" rx="6"/>
    <g transform="rotate(90 269 269)"><rect x="263" y="20" width="12" height="30" rx="6"/></g>
    <g transform="rotate(180 269 269)"><rect x="263" y="20" width="12" height="30" rx="6"/></g>
    <g transform="rotate(270 269 269)"><rect x="263" y="20" width="12" height="30" rx="6"/></g>
  </g>
  <!-- intercardinal ticks -->
  <g fill="#B9D3DA">
    <g transform="rotate(45 269 269)"><rect x="265" y="24" width="8" height="20" rx="4"/></g>
    <g transform="rotate(135 269 269)"><rect x="265" y="24" width="8" height="20" rx="4"/></g>
    <g transform="rotate(225 269 269)"><rect x="265" y="24" width="8" height="20" rx="4"/></g>
    <g transform="rotate(315 269 269)"><rect x="265" y="24" width="8" height="20" rx="4"/></g>
  </g>
  <!-- two-tone needle, gently off-north -->
  <g transform="rotate(-14 269 269)">
    <path d="M269 104 L292 271 L246 271 Z" fill="#8FB3BC"/>
    <path d="M269 434 L292 271 L246 271 Z" fill="#DCE9EC"/>
    <line x1="269" y1="104" x2="269" y2="434" stroke="#EAF2F4" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- hub -->
  <circle cx="269" cy="269" r="24" fill="#C4DAE0"/>
  <circle cx="269" cy="269" r="13" fill="#EAF2F4"/>
  <circle cx="269" cy="269" r="4.5" fill="#8FB3BC"/>
  <!-- top-down sheen -->
  <circle cx="269" cy="269" r="266" fill="url(#sheen)"/>
</svg>
